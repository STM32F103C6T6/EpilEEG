# config/medformer/medformer_epilepsy_eeg.yaml
# Minimal engineering-adapted MedFormer config.
# 目的：先像 EEGNet 一样稳定接入工程，观察原始 MedFormer 主体表现。
# 不使用 anti-collapse / logit calibration / 特殊 Predictor 训练逻辑。

model:
  task_name: 'classification'

  # --- Core MedFormer parameters ---
  d_model: 128
  d_ff: 256
  n_heads: 8
  e_layers: 3
  dropout: 0.2
  activation: 'gelu'

  # --- Multi-scale patching ---
  patch_len_list: "16,32"

  # 重要：
  # 原始 GitHub Embed.py 会在 ListPatchEmbedding.forward() 中随机执行 augmentation。
  # 如果这里设为 "mask"，验证/测试阶段也会随机 mask，导致结果不稳定。
  # 所以第一轮工程适配基线先关掉。
  augmentations: "none"

  single_channel: False
  no_inter_attn: False

training:
  optimizer: 'adamw'

  # 原配置 0.005 对 Transformer 偏激进，容易出现 logits/bias 来回摆动。
  # 先用和 EEGNet 同量级的 0.001 做工程接入基线。
  lr: 0.001

  # 先降低正则干扰；确认能学习后再调 weight_decay/dropout。
  weight_decay: 0.0

  loss: 'crossentropyloss'
  batch_size: 64
  epochs: 100
  patience: 20
  print_freq: 1
  debug: False

  # 暂时不配置 scheduler。
  # 你之前 BasePredictor 版本识别的是 'cosineannealing'，
  # 而不是 'cosineannealinglr'，先去掉避免混淆。
