# config/hat/hat_epilepsy_eeg.yaml
# Configuration for HAT model on the preprocessed epilepsy_eeg dataset
# Target model size: roughly 3M-5M parameters (implementation-dependent)

model:
  structure_type: "time->electrode"

  spatial:
    embed_dim: 128
    num_heads: 8
    dropout: 0.2
    num_layers: 3
    kernel_size: 3

  temporal:
    embed_dim: 128
    num_heads: 8
    dropout: 0.2
    num_layers: 3
    kernel_size: 41
    stride: 1
    pooling_ratio: 2

  fusion:
    embed_dim: 256
    num_heads: 8
    dropout: 0.2
    num_layers: 1

  classifier:
    hidden_dim: 256
    dropout: 0.3

training:
  optimizer: "adamw"
  lr: 0.0002
  weight_decay: 0.0005
  loss: "crossentropyloss"
  batch_size: 64
  epochs: 100
  patience: 12
  print_freq: 1
  debug: false

  scheduler:
    type: "cosineannealinglr"
    T_max: 100
    eta_min: 1e-6
